server:
  port: ${PORT:8083}

spring:
  application:
    name: scheduler-engine
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:stud}
    password: ${RABBITMQ_PASSWORD:stud}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  health:
    rabbit:
      enabled: false
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

app:
  fatigue:
    store: memory
    publisher: none
