server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: task-service
          uri: lb://task-service
          predicates:
            - Path=/api/tasks/**
        - id: scheduler-engine
          uri: lb://scheduler-engine
          predicates:
            - Path=/api/plans/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
